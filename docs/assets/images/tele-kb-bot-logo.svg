<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Paper plane base (steel — prevents anti-alias gap at center seam) -->
  <path d="M256 131 L367 276 L275 381 L256 341 L237 381 L145 276 Z" fill="#5A8FC0"/>

  <!-- Right half overlay (cyan — dominant accent, "Chat + AI" side) -->
  <path d="M256 131 L367 276 L275 381 L256 341 Z" fill="#00A8E8"/>

  <!-- Outer white stroke — defines edge on dark backgrounds, subtle halo on light -->
  <path d="M256 131 L367 276 L275 381 L256 341 L237 381 L145 276 Z" fill="none" stroke="white" stroke-width="5" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- Knowledge document bars (left interior, white) -->
  <rect x="210" y="199" width="40" height="8" rx="4" fill="white"/>
  <rect x="194" y="239" width="56" height="8" rx="4" fill="white"/>

  <!-- AI neural nodes (right interior, white) -->
  <circle cx="294" cy="216" r="10" fill="white"/>
  <circle cx="322" cy="289" r="10" fill="white"/>
  <line x1="294" y1="226" x2="322" y2="279" stroke="white" stroke-width="4" stroke-linecap="round"/>
</svg>
